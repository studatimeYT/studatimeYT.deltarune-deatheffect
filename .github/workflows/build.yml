name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest

          - name: Android32
            os: ubuntu-latest
            target: Android32

          - name: Android64
            os: ubuntu-latest
            target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      # 🚀 THE FIX: Installs Geode CLI manually and uses '-y' to force-skip the 7-Zip prompt crash!
      # It runs on both Windows and Linux runners safely.
      - name: Install Geode CLI Manually
        run: |
          if [ "${{ matrix.config.os }}" = "windows-latest" ]; then
            curl -LO https://github.com/geode-sdk/cli/releases/latest/download/geode-cli-v3.7.4-win.zip
            7z x geode-cli-v3.7.4-win.win.zip -y -o"$HOME/.geode/bin"
            echo "$HOME/.geode/bin" >> $GITHUB_PATH
          else
            curl -LO https://github.com/geode-sdk/cli/releases/latest/download/geode-cli-v3.7.4-linux.zip
            mkdir -p $HOME/.geode/bin
            unzip -o geode-cli-v3.7.4-linux.zip -d $HOME/.geode/bin
            chmod +x $HOME/.geode/bin/geode
            echo "$HOME/.geode/bin" >> $GITHUB_PATH
          fi
        shell: bash

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          target: ${{ matrix.config.target }}

  package:
    name: Package builds
    runs-on: ubuntu-latest
    needs: ['build']

    steps:
      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: Build Output
          path: ${{ steps.build.outputs.build-output }}
